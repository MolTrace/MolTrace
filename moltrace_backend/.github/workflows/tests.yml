
name: NMRCheck Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev --extra fid

      - name: Run tests
        env:
          PYTHONPATH: src
          APP_ENV: test
          REQUIRE_VERIFIED_EMAIL: "false"
          API_KEY: test-key
        run: uv run pytest
