
name: NMRCheck Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev --extra fid

      - name: Run tests
        env:
          PYTHONPATH: src
          APP_ENV: test
          REQUIRE_VERIFIED_EMAIL: "false"
          API_KEY: test-key
        run: uv run pytest

      # Phase 0 foundation (Prompt 19): lint the new infra package + its tests
      # (ruff non-regression, scoped so it cannot trip on unrelated legacy code),
      # then run the end-to-end smoke + 10x byte-identical determinism gate as an
      # explicit, named CI check. The infra unit tests already run in `uv run
      # pytest` above; this re-runs only the e2e file for a visible determinism
      # signal. Uses the always-on core only -- the optional MLflow/DVC/GE paths
      # stay `importorskip`-skipped here by design (install the `infra` extra to
      # exercise them).
      - name: Phase 0 foundation gate (infra lint + e2e determinism)
        env:
          PYTHONPATH: src
        run: |
          uv run ruff check src/moltrace/spectroscopy/infra tests/test_infra_*.py tests/test_e2e.py
          uv run pytest tests/test_e2e.py -q

      - name: Raw FID Prompt sidecar smoke report
        env:
          PYTHONPATH: src
        run: uv run moltrace-raw-fid-sidecar-report --limit 1 --no-include-varian --quiet --smoke

      - name: Raw FID Prompt manual promotion gate diagnostic
        if: always()
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: >
          uv run moltrace-raw-fid-sidecar-report
          --limit 20
          --include-varian
          --quiet
          --promotion-gate
          --output-dir "$RUNNER_TEMP/raw_fid_prompt_manual_promotion_gate"

      - name: Upload Raw FID Prompt manual promotion gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-fid-prompt-manual-promotion-gate
          path: ${{ runner.temp }}/raw_fid_prompt_manual_promotion_gate
          if-no-files-found: ignore

      - name: Raw FID Prompt provenance checksum report
        if: always()
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: >
          uv run moltrace-raw-fid-sidecar-report
          --limit 20
          --include-varian
          --quiet
          --output-dir "$RUNNER_TEMP/raw_fid_prompt_provenance_checksums"

      - name: Upload Raw FID Prompt provenance checksum report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-fid-prompt-provenance-checksums
          path: ${{ runner.temp }}/raw_fid_prompt_provenance_checksums
          if-no-files-found: ignore

      - name: Raw FID Prompt shadow comparison summary
        if: always()
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: >
          uv run moltrace-raw-fid-sidecar-report
          --limit 20
          --include-varian
          --quiet
          --output-dir "$RUNNER_TEMP/raw_fid_prompt_shadow_comparison"

      - name: Upload Raw FID Prompt shadow comparison summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-fid-prompt-shadow-comparison
          path: |
            ${{ runner.temp }}/raw_fid_prompt_shadow_comparison/raw_fid_prompt_shadow_comparison_summary.json
            ${{ runner.temp }}/raw_fid_prompt_shadow_comparison/raw_fid_prompt_shadow_comparison_summary.csv
          if-no-files-found: ignore

      - name: Summarize Raw FID Prompt shadow comparison review
        if: always()
        run: |
          {
            echo "### Raw FID Prompt shadow comparison"
            echo ""
            echo "- Artifact: \`raw-fid-prompt-shadow-comparison\`"
            echo "- Files: \`raw_fid_prompt_shadow_comparison_summary.json\`, \`raw_fid_prompt_shadow_comparison_summary.csv\`"
            echo "- Scope: read-only release evidence for Prompt 1/2 sidecar-vs-legacy fixture review."
            echo "- Runtime activation: blocked. A separate manual runtime promotion must be implemented and reviewed before Prompt 1/2 can affect SpectraCheck spectra."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Raw FID Prompt release readiness summary
        if: always()
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: >
          uv run moltrace-raw-fid-sidecar-report
          --limit 20
          --include-varian
          --quiet
          --output-dir "$RUNNER_TEMP/raw_fid_prompt_release_readiness"

      - name: Upload Raw FID Prompt release readiness summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-fid-prompt-release-readiness
          path: ${{ runner.temp }}/raw_fid_prompt_release_readiness/raw_fid_prompt_release_readiness.md
          if-no-files-found: ignore

      - name: Summarize Raw FID Prompt release readiness review
        if: always()
        run: |
          {
            echo "### Raw FID Prompt release readiness"
            echo ""
            echo "- Artifact: \`raw-fid-prompt-release-readiness\`"
            echo "- File: \`raw_fid_prompt_release_readiness.md\`"
            echo "- Scope: one read-only reviewer summary of manual-promotion gate, provenance, and shadow-comparison status."
            echo "- Runtime activation: blocked until a separate manual runtime promotion is implemented and reviewed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize Raw FID Prompt artifact map
        if: always()
        run: |
          {
            echo "### Raw FID Prompt artifact map"
            echo ""
            echo "| Artifact | Open this when | Release decision |"
            echo "| --- | --- | --- |"
            echo "| \`raw-fid-prompt-release-readiness\` | You need the fastest one-page Prompt 1/2 readiness summary. | Reviewer-facing summary only; runtime activation stays blocked. |"
            echo "| \`raw-fid-prompt-shadow-comparison\` | You need sidecar-vs-legacy fixture deltas. | Read-only comparison evidence; do not use it to drive plotted spectra. |"
            echo "| \`raw-fid-prompt-provenance-checksums\` | You need fixture/report hashes for audit trails. | Audit evidence only; investigate hash drift before release. |"
            echo "| \`raw-fid-prompt-manual-promotion-gate\` | You need the detailed manual-promotion gate diagnostics. | May show \`review_required\` without failing CI; \`activation_allowed=false\` must remain in effect. |"
            echo ""
            echo "All four artifacts are diagnostic release evidence. None may activate Prompt 1/2 for SpectraCheck runtime spectra, raw-FID plotting, processed analysis, peak markers, legends, phase correction, or baseline correction."
          } >> "$GITHUB_STEP_SUMMARY"

  prompt-sidecar-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.3

      - name: Install backend dependencies
        working-directory: moltrace_backend
        run: uv sync --extra dev --extra fid

      - name: Install frontend dependencies
        working-directory: moltrace_frontend
        run: pnpm install --frozen-lockfile

      - name: Run Prompt sidecar guardrail suite
        id: prompt_sidecar_guardrails
        run: scripts/run_prompt_sidecar_guardrails.sh

      - name: Run release-health contract guardrail suite
        id: release_health_guardrails
        run: scripts/run_release_health_contract_guardrails.sh

      - name: Summarize reviewer guardrail workflow
        if: always()
        run: |
          {
            echo "### Reviewer guardrail workflow"
            echo ""
            echo "- Prompt sidecar guardrails: \`${{ steps.prompt_sidecar_guardrails.outcome }}\`"
            echo "- Release-health guardrails: \`${{ steps.release_health_guardrails.outcome }}\`"
            echo ""
            echo "Run locally before merging diagnostic-artifact, release-health, Deployment Settings, CI artifact, or release-checklist changes:"
            echo ""
            echo "\`\`\`bash"
            echo "./scripts/run_prompt_sidecar_guardrails.sh"
            echo "./scripts/run_release_health_contract_guardrails.sh"
            echo "\`\`\`"
            echo ""
            echo "If Prompt sidecar guardrails fail: stop release review until the change is proven metadata-only or a separate manual runtime-promotion phase is opened."
            echo "If release-health guardrails fail: update backend payloads, frontend parsing, Deployment Settings rendering, tests, and docs together."
            echo "If scientific or spectrum-rendering tests fail: fix the owning SpectraCheck regression instead of changing this checklist."
            echo ""
            echo "Passing these guardrails does not activate Prompt 1/2 for runtime spectra."
          } >> "$GITHUB_STEP_SUMMARY"
