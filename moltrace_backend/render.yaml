# Backend-only Render Blueprint for MolTrace.
# Use the repo-root render.yaml when deploying the backend and frontend together.
services:
  - type: web
    name: moltrace-backend
    runtime: python
    plan: starter
    rootDir: moltrace_backend
    buildCommand: uv sync --frozen --no-dev --extra fid
    startCommand: uv run uvicorn nmrcheck.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: moltrace-db
          property: connectionString
      - key: BASE_URL
        value: https://moltrace-backend.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://moltrace-frontend.onrender.com
      - key: API_KEY
        generateValue: true
      - key: REQUIRE_VERIFIED_EMAIL
        value: "false"
      - key: EMAIL_BACKEND
        value: database
      - key: QUEUE_NAME
        value: moltrace
      - key: HEALTHCHECK_PATH
        value: /health
      - key: ALLOWED_UPLOAD_TYPES
        value: csv,json
      - key: RELEASE_STAGE
        value: render-production
      - key: RELEASE_VERSION
        value: 0.61.0

databases:
  - name: moltrace-db
    plan: basic-256mb
    databaseName: moltrace
    user: moltrace
