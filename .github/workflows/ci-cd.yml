# MolTrace CI/CD
#
# This is a monorepo: pnpm/Next.js FE under moltrace_frontend/ and uv/Python
# BE under moltrace_backend/. Both are gated by tests before any of the
# three production targets gets a deploy.
#
# Production targets (all three are real production):
#   - Vercel             — primary FE (moltrace.co, www.moltrace.co)
#   - Render web (FE)    — second-region FE mirror (moltrace-frontend1)
#   - Render web (BE)    — backend API (moltrace-backend)
# The Render-managed Postgres (moltrace-db) is NOT a deploy target — it has
# no Auto-Deploy toggle and no deploy hook; schema migrations land via the
# backend's startCommand chain (`alembic upgrade head && uvicorn …`).
#
# Required GitHub Secrets (set under Settings → Secrets and variables →
# Actions → New repository secret):
#   VERCEL_DEPLOY_HOOK       — Vercel "Deploy Hooks" URL for the FE project
#                              (Project Settings → Git → Deploy Hooks)
#   RENDER_FE_DEPLOY_HOOK    — Render Deploy Hook URL for moltrace-frontend1
#                              (Service Settings → Deploy Hook)
#   RENDER_BE_DEPLOY_HOOK    — Render Deploy Hook URL for moltrace-backend
#                              (Service Settings → Deploy Hook)
#
# Required platform toggles (one-time, manual):
#   - Vercel: disable auto-deploy on the connected Git repo (file-based via
#     moltrace_frontend/vercel.json with `git.deploymentEnabled: false`).
#   - Render: set "Auto-Deploy" to "No" on BOTH the moltrace-backend AND the
#     moltrace-frontend1 services.
#
# Without those toggles the platforms will keep deploying every push
# regardless of this workflow's verdict; with them, only commits that pass
# both test jobs reach production.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel an older run on the same ref when a new push lands — avoids racing
# deploys and double-billing minutes.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default (Security Prompt 18 — zero-trust CI). Every job inherits a
# read-only GITHUB_TOKEN unless it explicitly scopes up; only `attest` (id-token +
# attestations write, for keyless Sigstore) and `verify-provenance` (attestations
# read) need more. The deploy job only POSTs to external deploy-hook secrets and
# needs no GITHUB_TOKEN write at all.
permissions:
  contents: read

jobs:
  frontend-tests:
    name: Frontend · vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moltrace_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # pnpm must be installed BEFORE setup-node so the cache key can resolve
      # the pnpm store. Version is pinned to match moltrace_frontend/package.json
      # (packageManager: pnpm@11.0.3).
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 11.0.3

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          # Matches moltrace_frontend/package.json engines.node (22.14.0).
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: moltrace_frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `vitest` (no args) runs once in CI environments per its own CI
      # detection, but `--run` makes the one-shot mode explicit so the job
      # never hangs in interactive mode if the env var is missing.
      - name: Run vitest
        run: pnpm test -- --run

  backend-tests:
    name: Backend · pytest (shard ${{ matrix.group }}/4)
    runs-on: ubuntu-latest
    # Sharded across 4 parallel runners with pytest-split. GitHub's standard
    # ubuntu-latest is only 2 vCPU, so `-n auto` alone gave a modest speedup and
    # the whole non-slow suite had crept up to ~30 min — right at the ceiling, so
    # it intermittently got KILLED near 90 % (a timed-out job reports as
    # "cancelled", which then skips the gate + deploy). Each shard now runs ~1/4
    # of the collected tests (still `-n auto` within the shard) → ~8 min, and the
    # 30-min backstop only ever fires on a true hang. `fail-fast: false` so one
    # shard's real failure reports on its own instead of cancelling its siblings.
    # NOT coupled to frontend-tests (no `needs:`) — FE and BE run independently.
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: moltrace_backend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          # uv manages its own Python install — we pick the version that
          # matches moltrace_backend/render.yaml's PYTHON_VERSION.
          python-version: "3.13.5"
          enable-cache: true
          cache-dependency-glob: moltrace_backend/uv.lock

      # The `fid` extra is required for the FID-processing code paths the
      # tests exercise; `dev` brings pytest + httpx. The `infra` extra
      # (mlflow/dvc/great-expectations) is intentionally NOT installed —
      # per the comment in pyproject.toml, adapter tests `pytest.importorskip`
      # those so the always-on native path stays gated by CI.
      - name: Install dependencies
        run: uv sync --frozen --extra fid --extra dev

      # pytest config (testpaths=tests, addopts=-q -m 'not slow') in
      # pyproject.toml already skips the slow marker; pytest-split then divides
      # the collected (non-slow) tests into 4 groups by count and this leg runs
      # only group ${{ matrix.group }}. `-n auto` still fans that group across the
      # runner's cores. pytest-split is pulled in just-in-time via `uv run --with`
      # so the backend's pyproject stays untouched (split-sessions: no BE edits).
      # CI-only: local runs stay serial (`uv run pytest`) for clean debugging.
      - name: Run pytest (shard ${{ matrix.group }}/4)
        run: uv run --with pytest-split pytest -n auto --splits 4 --group ${{ matrix.group }}

  backend-slow-tests:
    name: Backend · slow regression suite
    # The heavy FID/GSD validation guards (>30s, marked `slow` and therefore
    # excluded from the per-commit fast lane above). Run on pushes to main only
    # so the regression coverage isn't lost while PRs stay fast. This is an
    # independent signal — a failure turns the run red but does NOT block the
    # deploy hooks. To make it a hard deploy gate, add `backend-slow-tests` to
    # the `deploy` job's `needs:` below.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Generous ceiling: the slow set is a handful of heavy fixtures (the dense
    # ¹³C FID recovery alone is ~40s of compute), so 30 min kills a true hang
    # without clipping a legitimately long validation run.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: moltrace_backend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13.5"
          enable-cache: true
          cache-dependency-glob: moltrace_backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra fid --extra dev

      - name: Run slow tests
        run: uv run pytest -n auto -m slow

  deployment-gate:
    name: Deployment gate · fail-closed release control
    # The Prompt 18 release gate. It `needs` both test suites, so the gate's
    # "test suite is green" check is satisfied by construction — if either suite
    # fails this job is skipped, which cascades to skip `deploy` below. Nothing
    # reaches production without passing evaluation, audit, and validation.
    needs: [frontend-tests, backend-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moltrace_backend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13.5"
          enable-cache: true
          cache-dependency-glob: moltrace_backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra fid --extra dev

      # `--self-check` exits non-zero unless the gate ALLOWS an all-pass candidate
      # and BLOCKS every single-check failure (dominance · audit chain · tests
      # green · gold-set leakage). There are no live model artifacts in CI, so this
      # is the always-on guarantee that the fail-closed release-control machinery
      # stays intact — a regression in the gate logic fails CI before it can ever
      # let a bad model through to production.
      - name: Verify deployment gate fails closed
        run: uv run moltrace-deployment-gate --self-check

      # The Prompt 18 REGULATORY release gate (rule-set / model lifecycle). Same fail-closed
      # contract: `--self-check` exits non-zero unless the gate ALLOWS an all-pass candidate and
      # BLOCKS every single-check failure (Prompt 17 eval gate · current GAMP 5 D11 validation
      # record · Prompt 12 Annex 22 audit chain · tests green). Keeps the regulatory lifecycle
      # gate machinery honest before any rule-set can reach production.
      - name: Verify regulatory compliance-MLOps gate fails closed
        run: uv run python -m moltrace.regulatory.ops --self-check

  # ---------------------------------------------------------------------------
  # Security Prompt 15 — SBOM + SLSA provenance + keyless Sigstore attestation,
  # with a verify-at-deploy gate. Deploy-hook-honest: CI proves and gates the
  # SOURCE + dependency closure (SBOM) at the gated commit and refuses to fire
  # the Vercel/Render deploy hooks unless the attestations verify. It does NOT
  # attest the artifact the platforms rebuild downstream — that build runs
  # outside CI's signing boundary (documented in docs/supply_chain_provenance.md).
  # ---------------------------------------------------------------------------
  sbom-backend:
    name: SBOM · backend (CycloneDX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moltrace_backend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13.5"
          enable-cache: true
          cache-dependency-glob: moltrace_backend/uv.lock
      # CycloneDX SBOM straight from uv.lock (no project build needed). NOTE: uv's CycloneDX
      # exporter is a PREVIEW feature and emits spec v1.5 (see docs/supply_chain_provenance.md).
      - name: Generate backend SBOM
        run: uv export --format cyclonedx1.5 --no-emit-project -o sbom-backend.cdx.json
      # Fail-closed if the SBOM isn't well-formed JSON, so a corrupt/empty file can't be attested
      # then "verified" and shipped as a compliance artifact.
      - name: Validate backend SBOM
        run: python3 -c "import json; json.load(open('sbom-backend.cdx.json')); print('backend SBOM is valid JSON')"
      - name: Upload backend SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-backend
          path: moltrace_backend/sbom-backend.cdx.json
          if-no-files-found: error

  sbom-frontend:
    name: SBOM · frontend (CycloneDX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moltrace_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 11.0.3
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: moltrace_frontend/pnpm-lock.yaml
      # pnpm's built-in SBOM (pnpm >= 11). --lockfile-only avoids a full install; emits CycloneDX 1.7.
      # --silent suppresses pnpm log lines that would otherwise leak into the redirected stdout and
      # corrupt the JSON (pnpm prints some notices to stdout, not stderr).
      - name: Generate frontend SBOM
        run: pnpm sbom --silent --sbom-format cyclonedx --prod --lockfile-only > sbom-frontend.cdx.json
      # Fail-closed if the SBOM isn't well-formed JSON (e.g. a stray log line leaked into stdout).
      - name: Validate frontend SBOM
        run: node -e "JSON.parse(require('fs').readFileSync('sbom-frontend.cdx.json','utf8')); console.log('frontend SBOM is valid JSON')"
      - name: Upload frontend SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-frontend
          path: moltrace_frontend/sbom-frontend.cdx.json
          if-no-files-found: error

  attest:
    name: Attest · SLSA provenance (keyless Sigstore)
    needs: [sbom-backend, sbom-frontend]
    # Mint attestations only for release commits (push to main). Fully keyless via Sigstore /
    # Fulcio / Rekor + the Actions OIDC token — no stored key, no external account.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token -> Fulcio short-lived signing cert (keyless)
      attestations: write # persist the SLSA provenance to the repo attestation store
      contents: read
    steps:
      - name: Download backend SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom-backend
          path: sbom-artifacts
      - name: Download frontend SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom-frontend
          path: sbom-artifacts
      - name: Attest SLSA build provenance for both SBOMs
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "sbom-artifacts/sbom-backend.cdx.json,sbom-artifacts/sbom-frontend.cdx.json"

  verify-provenance:
    name: Verify provenance · supply-chain gate
    needs: [attest]
    # Separate gating job (NOT an in-deploy step) so a verify failure stops EVERY deploy hook —
    # the deploy job's hook steps use `if: always()`, which a failed in-job step would not block.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Download backend SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom-backend
          path: sbom-artifacts
      - name: Download frontend SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sbom-frontend
          path: sbom-artifacts
      # Verify the EXACT attested artifacts (same-run download — digests match by construction; no
      # nondeterministic regeneration). Fail-closed: any verification failure blocks the deploy job.
      - name: Verify SLSA provenance for both SBOMs
        env:
          GH_TOKEN: ${{ github.token }}
          # Template the repo path off the runtime context so this step survives any future
          # transfer or rename (and so the original sirmcdoe -> org transfer that unblocks the
          # GitHub attestations API on private repos doesn't need a workflow edit).
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for sbom in sbom-backend.cdx.json sbom-frontend.cdx.json; do
            echo "::group::gh attestation verify $sbom"
            gh attestation verify "sbom-artifacts/$sbom" \
              --repo "$REPO" \
              --signer-workflow "$REPO/.github/workflows/ci-cd.yml"
            echo "::endgroup::"
          done

  deploy:
    name: Deploy · Vercel + Render (FE + BE)
    needs: [frontend-tests, backend-tests, deployment-gate, verify-provenance]
    # Only deploy when both gates passed on a direct push to main (not PRs,
    # not manual reruns of feature branches).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # `if: always()` on each step lets every target fire independently — a
    # Vercel hiccup must NOT block Render production, since both are real
    # production targets. The final `report` step then fails the job if
    # any individual hook returned non-2xx, so the run still goes red.
    steps:
      - name: Trigger Vercel deploy hook (FE · primary)
        id: vercel
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        # `--fail` so a 4xx/5xx fails the step (deploy hooks return 201 on
        # success). `-sS` keeps output quiet but still surfaces errors. The
        # URL is interpolated from the env var so it never appears in
        # workflow logs even when --fail prints a diagnostic.
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -sS --fail -X POST "$HOOK"

      - name: Trigger Render deploy hook (FE · second region)
        id: render_fe
        if: always()
        env:
          HOOK: ${{ secrets.RENDER_FE_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_FE_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -sS --fail -X POST "$HOOK"

      - name: Trigger Render deploy hook (BE · API)
        id: render_be
        if: always()
        env:
          HOOK: ${{ secrets.RENDER_BE_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_BE_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -sS --fail -X POST "$HOOK"

      - name: Fail if any hook failed
        if: always()
        # Each step above sets its own outcome; this step fails the job
        # when any one of them was not 'success' (skipped also counts —
        # skipped means a prior step's failure short-circuited the run,
        # which `if: always()` should prevent, but we keep the check
        # strict so silent skips never look green).
        run: |
          v="${{ steps.vercel.outcome }}"
          rf="${{ steps.render_fe.outcome }}"
          rb="${{ steps.render_be.outcome }}"
          echo "Vercel=$v · Render-FE=$rf · Render-BE=$rb"
          if [ "$v" != "success" ] || [ "$rf" != "success" ] || [ "$rb" != "success" ]; then
            echo "::error::one or more deploy hooks did not succeed"; exit 1
          fi
