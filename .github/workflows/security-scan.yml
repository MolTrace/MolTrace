name: security-scan

# Security Prompt 14 — Secure-SDLC CI gates: SAST (Semgrep), SCA (dependency + license), and
# IaC scanning. Companion to secret-scan.yml (Prompt 8, gitleaks) — together they form the
# secure-SDLC scan suite. Standalone workflow (no `needs:` coupling to ci-cd.yml), mirroring
# secret-scan.yml's design so a test failure can never skip these gates and the files never contend.
#
# POLICY (see docs/security_sdlc_gates.md): CRITICAL findings BLOCK; HIGH/MEDIUM are reported as
# SARIF to the GitHub Security tab (Code scanning) and tracked to closure per the triage SLAs.
#
# To make these BLOCK merge: add each job (SAST · Semgrep, SCA · Trivy, IaC · Trivy) as a REQUIRED
# status check under Settings → Branches → branch protection for `main` (same one-time step as the
# gitleaks gate). Because `deploy` in ci-cd.yml only runs on a green push to `main`, a blocked PR
# cannot merge and therefore cannot deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # upload SARIF to the Security tab (Code scanning)

jobs:
  sast:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13.5"

      # Curated public rulesets (no Semgrep account/token needed). The report pass emits SARIF for
      # ALL severities (tracked in the Security tab); the gate pass blocks ONLY on ERROR-severity
      # (critical) findings, so HIGH/MEDIUM are surfaced without breaking the build. Run via `uvx`
      # (uv's tool runner) — consistent with the repo's uv toolchain; pin the version for prod
      # hardening (see docs/security_sdlc_gates.md).
      - name: Semgrep — report (all severities → SARIF)
        run: |
          uvx --from semgrep semgrep scan \
            --config p/python --config p/javascript --config p/typescript \
            --config p/owasp-top-ten --config p/react \
            --sarif --output semgrep.sarif \
            --exclude moltrace_frontend/.next --exclude '**/node_modules' || true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Semgrep — gate (block on CRITICAL / ERROR-severity)
        run: |
          uvx --from semgrep semgrep scan \
            --config p/python --config p/javascript --config p/typescript \
            --config p/owasp-top-ten --config p/react \
            --severity ERROR --error -q \
            --exclude moltrace_frontend/.next --exclude '**/node_modules'

  sca:
    name: SCA · Trivy (deps + license)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Filesystem scan picks up Python (uv.lock) and JS (pnpm-lock.yaml) dependency advisories plus
      # license findings. Report pass → SARIF (HIGH+CRITICAL, tracked); gate pass → blocks on CRITICAL.
      - name: Trivy — report (HIGH,CRITICAL → SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,license
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-sca.sarif
          exit-code: "0"
          skip-dirs: moltrace_frontend/.next,**/node_modules

      - name: Upload Trivy SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca
        continue-on-error: true

      - name: Trivy — gate (block on CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          skip-dirs: moltrace_frontend/.next,**/node_modules

  iac:
    name: IaC · Trivy config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Scans declarative infra (render.yaml blueprints + the GitHub Actions workflows themselves)
      # for misconfigurations. Report pass → SARIF; gate pass → blocks on CRITICAL.
      - name: Trivy — IaC report (→ SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-iac.sarif
          exit-code: "0"

      - name: Upload Trivy IaC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac
        continue-on-error: true

      - name: Trivy — IaC gate (block on CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          severity: CRITICAL
          format: table
          exit-code: "1"

      # CSPM drift gate (Security Prompt 18): score the IaC against the committed
      # posture baseline and FAIL on any NEW HIGH/CRITICAL misconfiguration not already
      # accepted — "posture continuously scored, drift alerted". Trivy's gate above
      # still hard-blocks CRITICAL; this tightens it to block new HIGH drift too. Skips
      # vendored node_modules/.next so dependency Dockerfiles aren't scored.
      - name: Trivy — IaC posture report (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          format: json
          output: trivy-iac.json
          exit-code: "0"
          skip-dirs: moltrace_frontend/.next,**/node_modules

      - name: CSPM — fail on IaC posture drift from baseline
        run: |
          python3 infra/cspm/score_iac_posture.py \
            --trivy-json trivy-iac.json \
            --baseline infra/cspm/iac_posture_baseline.json
