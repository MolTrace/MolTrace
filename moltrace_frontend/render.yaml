# Frontend-only Render Blueprint for MolTrace.
# Use the repo-root render.yaml when deploying the backend and frontend together.
services:
  - type: web
    name: moltrace-frontend
    runtime: node
    plan: starter
    rootDir: moltrace_frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api/backend
      - key: API_BASE_URL
        value: https://moltrace-backend.onrender.com
