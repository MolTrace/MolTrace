# Render Blueprint for the MolTrace monorepo.
# Render resolves rootDir paths from the repository root.
services:
  - type: web
    name: moltrace-backend
    runtime: python
    plan: starter
    rootDir: moltrace_backend
    buildCommand: uv sync --frozen --no-dev --extra fid
    startCommand: uv run python -m uvicorn nmrcheck.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: moltrace-db
          property: connectionString
      - key: BASE_URL
        value: https://moltrace-backend.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://moltrace-frontend1.onrender.com
      - key: API_KEY
        generateValue: true
      - key: REQUIRE_VERIFIED_EMAIL
        value: "false"
      - key: EMAIL_BACKEND
        value: database
      - key: QUEUE_NAME
        value: moltrace
      - key: HEALTHCHECK_PATH
        value: /health
      - key: ALLOWED_UPLOAD_TYPES
        value: csv,json
      - key: RELEASE_STAGE
        value: render-production
      - key: RELEASE_VERSION
        value: 0.61.0

  - type: web
    name: moltrace-frontend1
    runtime: node
    plan: starter
    rootDir: moltrace_frontend
    buildCommand: corepack enable && corepack prepare pnpm@11.0.3 --activate && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm exec next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /api/app-version
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://moltrace-backend.onrender.com
      - key: API_BASE_URL
        value: https://moltrace-backend.onrender.com

databases:
  - name: moltrace-db
    plan: basic-256mb
    databaseName: moltrace
    user: moltrace
